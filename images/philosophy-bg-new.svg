  "/>

  <!-- ─────────────────────────────────────────
       Layer 3: y≈382 — 中層 / やや短い周期・大振幅
       カラー: エメラルドグリーン #36b89c
  ───────────────────────────────────────── -->
  <path fill="#36b89c" d="
    M 0 382
    C 160 352, 360 412, 560 382
    C 760 352, 960 404, 1160 376
    C 1300 358, 1400 394, 1440 382
