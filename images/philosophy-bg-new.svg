<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="none">
  <defs>
    <!-- 各波のフォームハイライト用グラデーション -->
    <linearGradient id="foam3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4f0e0" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#c4f0e0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="foam4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#caf4e4" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#caf4e4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ベース: 深海エメラルドブルー -->
  <rect width="1440" height="900" fill="#0d7280"/>

  <!-- ─────────────────────────────────────────
       Layer 1: y≈138 — 深海 / 長周期・低振幅
       カラー: 深水ティール #1688a2
  ───────────────────────────────────────── -->
  <path fill="#1688a2" d="
    M 0 140
    C 200 116, 420 164, 640 138
    C 860 112, 1060 158, 1240 130
    C 1340 116, 1410 148, 1440 138
    L 1440 900 L 0 900 Z
  "/>

  <!-- ─────────────────────────────────────────
       Layer 2: y≈258 — 深水域 / 中周期
       カラー: ティールグリーン #22a09c
  ───────────────────────────────────────── -->
  <path fill="#22a09c" d="
    M 0 260
    C 180 232, 380 288, 560 260
    C 740 232, 920 274, 1100 248
    C 1240 230, 1360 268, 1440 254
