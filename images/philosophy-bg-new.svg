  "/>

  <!-- ─────────────────────────────────────────
       Layer 4: y≈498 — 浅水域 / 最大振幅・非対称波
       カラー: 明るいエメラルド #58c8a4
  ───────────────────────────────────────── -->
  <path fill="#58c8a4" d="
    M 0 500
    C 200 468, 440 530, 660 498
    C 880 466, 1060 512, 1240 482
    C 1360 462, 1420 500, 1440 492
    L 1440 900 L 0 900 Z
  "/>
  <!-- Layer 4 フォームハイライト (波頭に泡) -->
  <path fill="url(#foam4)" d="
